<!-- wp:html -->
<style>
	.booking-popup {
		position: fixed;
		inset: 0;
		z-index: 200;
		display: none;
		align-items: center;
		justify-content: center;
		padding: 20px;
		box-sizing: border-box;
		opacity: 0;
		transition: opacity 0.35s ease;
	}

	.booking-popup.is-open,
	.booking-popup.is-active {
		opacity: 1;
	}

	.booking-popup__overlay {
		position: absolute;
		inset: 0;
		border: none;
		margin: 0;
		padding: 0;
		background: rgba(0, 0, 0, 0.55);
		cursor: pointer;
		opacity: 0;
		transition: opacity 0.35s ease;
	}

	.booking-popup.is-open .booking-popup__overlay,
	.booking-popup.is-active .booking-popup__overlay {
		opacity: 1;
	}

	.booking-popup__dialog {
		position: relative;
		z-index: 1;
		box-sizing: border-box;
		width: 100%;
		max-width: 520px;
		max-height: calc(100vh - 40px);
		overflow-y: auto;
		padding: 40px 30px 30px;
		border-radius: 24px;
		background: #ffffff;
		box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
		opacity: 0;
		transform: translateY(30px) scale(0.98);
		transition: opacity 0.35s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
	}

	.booking-popup.is-open .booking-popup__dialog,
	.booking-popup.is-active .booking-popup__dialog {
		opacity: 1;
		transform: translateY(0) scale(1);
	}

	.booking-popup__close {
		position: absolute;
		top: 16px;
		right: 16px;
		display: flex;
		align-items: center;
		justify-content: center;
		width: 40px;
		height: 40px;
		margin: 0;
		padding: 0;
		border: none;
		border-radius: 50%;
		background: #f5f5f5;
		color: #000000;
		font-size: 24px;
		line-height: 1;
		cursor: pointer;
	}

	.booking-popup__header {
		display: flex;
		flex-direction: column;
		align-items: center;
		gap: 10px;
		margin-bottom: 24px;
		text-align: center;
	}

	.booking-popup__subtitle {
		margin: 0;
		font-family: var(--wp--preset--font-family--imperial-script), "Imperial Script", cursive;
		font-size: 48px;
		font-weight: 400;
		line-height: 1;
		color: #ffc81e;
		text-transform: lowercase;
	}

	.booking-popup__title {
		margin: 0;
		font-family: var(--wp--preset--font-family--inter), Inter, sans-serif;
		font-size: 28px;
		font-weight: 600;
		line-height: 1.2;
		color: #000000;
		text-transform: uppercase;
	}

	.booking-popup__desc {
		margin: 0 0 24px;
		font-family: var(--wp--preset--font-family--inter), Inter, sans-serif;
		font-size: 16px;
		font-weight: 400;
		line-height: 1.3;
		color: #4d4d4d;
		text-align: center;
	}

	.booking-popup-form {
		display: flex;
		flex-direction: column;
		gap: 20px;
		width: 100%;
		margin: 0;
	}

	.booking-popup-form__fields {
		display: flex;
		flex-direction: column;
		gap: 16px;
		width: 100%;
	}

	.booking-popup-form__field {
		width: 100%;
	}

	.booking-popup-form__control {
		box-sizing: border-box;
		position: relative;
		display: block;
		width: 100%;
		min-height: 54px;
		border: 1px solid #f2f2f2;
		border-radius: 8px;
		background-color: #ffffff;
		transition: border-color 0.3s ease;
	}

	.booking-popup-form__control:focus-within {
		border-color: #e87f24;
	}

	.booking-popup-form__control.is-invalid {
		border-color: #ff4d4f;
		background-color: #fff5f5;
	}

	.booking-popup-form__control.is-success {
		border-color: #52c41a;
		background-color: #f6ffed;
	}

	.booking-popup-form__control > svg {
		position: absolute;
		left: 10px;
		top: 50%;
		z-index: 1;
		width: 24px;
		height: 24px;
		transform: translateY(-50%);
		pointer-events: none;
	}

	.booking-popup-form__control > svg path {
		fill: #c3c3c3;
		transition: fill 0.3s ease;
	}

	.booking-popup-form__control:focus-within > svg path {
		fill: #e87f24;
	}

	.booking-popup-form__input {
		box-sizing: border-box;
		display: block;
		width: 100%;
		min-height: 54px;
		padding: 14px 14px 14px 44px;
		border: none;
		border-radius: 8px;
		background: transparent;
		font-family: var(--wp--preset--font-family--inter), Inter, sans-serif;
		font-size: 16px;
		font-weight: 400;
		line-height: 1.3;
		color: #000000;
	}

	.booking-popup-form__input::placeholder {
		color: #c3c3c3;
	}

	.booking-popup-form__input:focus,
	.booking-popup-form__input:focus-visible {
		outline: none;
	}

	.booking-popup-form__input--date::-webkit-calendar-picker-indicator {
		cursor: pointer;
	}

	.booking-popup-form__submit {
		width: 100%;
		justify-content: center;
		transition: background-color 0.3s ease, color 0.3s ease, opacity 0.3s ease;
	}

	.booking-popup-form__message {
		width: 100%;
		margin: 0;
		font-family: var(--wp--preset--font-family--inter), Inter, sans-serif;
		font-size: 14px;
		line-height: 1.3;
		text-align: center;
	}

	.booking-popup-form__message.is-error {
		color: #ff4d4f;
	}

	.booking-popup-form__message.is-success {
		color: #52c41a;
	}

	.booking-popup-form__submit.is-loading {
		pointer-events: none;
		opacity: 0.85;
	}

	.booking-popup-form.is-success .booking-popup-form__submit,
	.booking-popup-form__submit.is-success {
		background-color: #2ecc71;
		color: #ffffff;
	}

	.booking-popup__dialog.is-success .booking-popup__header,
	.booking-popup__dialog.is-success .booking-popup__desc,
	.booking-popup__dialog.is-success .booking-popup-form__fields,
	.booking-popup__dialog.is-success .booking-popup-form__message,
	.booking-popup__dialog.is-success .booking-popup-form__submit {
		display: none;
	}

	.booking-popup__success {
		display: none;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		gap: 16px;
		padding: 20px 0 10px;
		text-align: center;
		opacity: 0;
		transform: translateY(16px);
		transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
	}

	.booking-popup__dialog.is-success .booking-popup__success {
		display: flex;
	}

	.booking-popup__dialog.is-success.is-success-visible .booking-popup__success {
		opacity: 1;
		transform: translateY(0);
	}

	.booking-popup__success-icon {
		display: flex;
		align-items: center;
		justify-content: center;
		width: 72px;
		height: 72px;
		border-radius: 50%;
		background-color: #2ecc71;
		color: #ffffff;
		font-family: var(--wp--preset--font-family--inter), Inter, sans-serif;
		font-size: 36px;
		font-weight: 600;
		line-height: 1;
	}

	.booking-popup__success-title {
		margin: 0;
		font-family: var(--wp--preset--font-family--inter), Inter, sans-serif;
		font-size: 24px;
		font-weight: 600;
		line-height: 1.2;
		color: #000000;
		text-transform: uppercase;
	}

	.booking-popup__success-text {
		margin: 0;
		max-width: 320px;
		font-family: var(--wp--preset--font-family--inter), Inter, sans-serif;
		font-size: 16px;
		font-weight: 400;
		line-height: 1.3;
		color: #4d4d4d;
	}

	@media (max-width: 768px) {
		.booking-popup__dialog {
			padding: 36px 20px 24px;
		}

		.booking-popup__subtitle {
			font-size: 40px;
		}

		.booking-popup__title {
			font-size: 22px;
		}
	}
</style>

<div class="booking-popup" id="booking-popup" role="dialog" aria-modal="true" aria-labelledby="booking-popup-title" aria-hidden="true">
	<button type="button" class="booking-popup__overlay" data-booking-close aria-label="Закрити вікно бронювання"></button>

	<div class="booking-popup__dialog">
		<button type="button" class="booking-popup__close" data-booking-close aria-label="Закрити">&times;</button>

		<header class="booking-popup__header">
			<p class="booking-popup__subtitle">checkout</p>
			<h2 class="booking-popup__title" id="booking-popup-title">Створіть мій день на узбережжі</h2>
		</header>

		<p class="booking-popup__desc">І якраз у подорожі — це те, де все відчувається легко</p>

		<form class="booking-popup-form" action="#" method="post" novalidate aria-labelledby="booking-popup-title">
			<div class="booking-popup-form__fields">
				<div class="booking-popup-form__field">
					<label class="screen-reader-text" for="booking-popup-name">Ваше ім'я</label>
					<div class="booking-popup-form__control">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">

						</svg>
						<input
							type="text"
							class="booking-popup-form__input"
							id="booking-popup-name"
							name="name"
							placeholder="Ваше ім'я"
							autocomplete="name"
							minlength="2"
							required
						>
					</div>
				</div>

				<div class="booking-popup-form__field">
					<label class="screen-reader-text" for="booking-popup-people">Кількість людей</label>
					<div class="booking-popup-form__control">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
							<path d="M16 11C17.66 11 18.99 9.66 18.99 8C18.99 6.34 17.66 5 16 5C14.34 5 13 6.34 13 8C13 9.66 14.34 11 16 11ZM8 11C9.66 11 10.99 9.66 10.99 8C10.99 6.34 9.66 5 8 5C6.34 5 5 6.34 5 8C5 9.66 6.34 11 8 11ZM8 13C5.67 13 1 14.17 1 16.5V19H15V16.5C15 14.17 10.33 13 8 13ZM16 13C15.71 13 15.38 13.02 15.03 13.05C16.19 13.89 17 15.02 17 16.5V19H23V16.5C23 14.17 18.33 13 16 13Z" fill="#C3C3C3"/>
						</svg>
						<input
							type="number"
							class="booking-popup-form__input"
							id="booking-popup-people"
							name="people"
							placeholder="Кількість людей"
							min="1"
							max="99"
							step="1"
							inputmode="numeric"
							required
						>
					</div>
				</div>

				<div class="booking-popup-form__field">
					<label class="screen-reader-text" for="booking-popup-age">Вік учасників</label>
					<div class="booking-popup-form__control">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
							<path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12.5 17H11V11H12.5V17ZM12.5 9.5H11V8H12.5V9.5Z" fill="#C3C3C3"/>
						</svg>
						<input
							type="text"
							class="booking-popup-form__input"
							id="booking-popup-age"
							name="participants_age"
							placeholder="Вік учасників"
							minlength="1"
							required
						>
					</div>
				</div>

				<div class="booking-popup-form__field">
					<label class="screen-reader-text" for="booking-popup-date">Дата</label>
					<div class="booking-popup-form__control">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">

						</svg>
						<input
							type="date"
							class="booking-popup-form__input booking-popup-form__input--date"
							id="booking-popup-date"
							name="date"
							placeholder="Оберіть дату"
							required
						>
					</div>
				</div>
			</div>

			<div class="booking-popup-form__message" role="status" aria-live="polite"></div>

			<button type="submit" class="btn btn--primary booking-popup-form__submit" id="booking-popup-submit">
				<span class="booking-popup-form__btn-text">Створити мій день на узбережжі</span>
				<svg class="btn__icon" xmlns="http://www.w3.org/2000/svg" width="13" height="10" viewBox="0 0 13 10" fill="none" aria-hidden="true"><path d="M7.78854 9.42292L6.91021 8.51917L10.0929 5.33646H0V4.08646H10.0929L6.91021 0.90375L7.78854 0L12.5 4.71146L7.78854 9.42292Z" /></svg>
			</button>
		</form>

		<div class="booking-popup__success" aria-hidden="true" role="status" aria-live="polite">
			<div class="booking-popup__success-icon" aria-hidden="true">✓</div>
			<p class="booking-popup__success-title">Запит відправлено!</p>
			<p class="booking-popup__success-text">Дякуємо! Ми зв&rsquo;яжемося з вами найближчим часом, щоб створити ваш день на узбережжі.</p>
		</div>
	</div>
</div>
<!-- /wp:html -->
