<!-- wp:html -->
<style>
	.footer-contacts {
		width: 100%;
		max-width: 1210px;
		margin: 0 auto;
		padding: 0 20px !important;
		box-sizing: border-box !important;
		overflow: visible !important;
	}

	.footer-contacts__banner {
		width: 100% !important;
		max-width: min(1170px, calc(100vw - 40px)) !important;
		margin: 80px auto !important;
		box-sizing: border-box !important;
		position: relative;
		overflow: hidden;
		border-radius: 24px !important;
		padding: 60px;
		display: flex;
		align-items: flex-end;
		gap: 10px;
		isolation: isolate;
	}

	.footer-contacts__bg {
		position: absolute;
		inset: 0;
		border-radius: 24px;
		background:
			linear-gradient(0deg, rgba(0, 0, 0, 0.40) 0%, rgba(0, 0, 0, 0.40) 100%),
			url('https://www.yulianaamalfitana.com/wp-content/uploads/2026/06/contact-img.png') center bottom / cover no-repeat;
		pointer-events: none;
		z-index: 0;
	}

	.footer-contacts__inner-border {
		position: absolute;
		inset: 0;
		border-radius: 24px;
		border: 10px solid rgba(255, 255, 255, 0.20);
		box-sizing: border-box;
		pointer-events: none;
		z-index: 3;
	}

	.footer-contacts__content {
		position: relative;
		z-index: 2;
		display: flex;
		flex: 1 1 0;
		flex-direction: column;
		gap: 10px;
		align-items: flex-start;
		min-width: 0;
	}

	.footer-contacts__label {
		margin: 0;
		color: #FFC81E;
		font-family: "Imperial Script", cursive;
		font-size: 60px;
		font-style: normal;
		font-weight: 400;
		line-height: normal;
		text-transform: lowercase;
	}

	.footer-contacts__title {
		margin: 0;
		font-family: var(--wp--preset--font-family--inter);
		font-size: 48px;
		font-weight: 600;
		line-height: 1.2;
		color: #fff;
		text-transform: uppercase;
	}

	.footer-contacts__desc {
		margin: 0;
		font-family: var(--wp--preset--font-family--inter);
		font-size: 18px;
		font-weight: 400;
		line-height: 1.3;
		color: #fff;
		max-width: 330px;
	}

	.footer-contacts__actions {
		position: relative;
		z-index: 2;
		display: flex;
		flex-direction: row;
		flex-shrink: 0;
		align-items: flex-start;
		gap: 10px;
	}

	@media (max-width: 768px) {
		.footer-contacts {
			padding: 0 20px !important;
		}

		.footer-contacts__banner {
			width: 100% !important;
			margin: 60px auto 80px !important;
			padding: 40px 20px !important;
			box-sizing: border-box !important;
			flex-direction: column !important;
			align-items: flex-start !important;
			gap: 30px !important;
		}

		.footer-contacts__bg {
			background:
				linear-gradient(0deg, rgba(0, 0, 0, 0.40) 0%, rgba(0, 0, 0, 0.40) 100%),
				url('https://www.yulianaamalfitana.com/wp-content/uploads/2026/06/contact-img.png') center bottom / cover no-repeat;
		}

		.footer-contacts__label {
			font-size: 48px;
		}

		.footer-contacts__title {
			font-size: 30px;
		}

		.footer-contacts__desc {
			font-size: 16px;
			max-width: 100%;
		}

		.footer-contacts__actions {
			flex-direction: column !important;
			width: 100% !important;
			gap: 12px !important;
		}

		.footer-contacts__actions .btn {
			width: 100% !important;
			justify-content: center !important;
		}
	}
</style>

<section class="footer-contacts" id="contacts" aria-label="Contacts and Booking">
	<div class="footer-contacts__banner">
		<div class="footer-contacts__bg" aria-hidden="true"></div>
		<div class="footer-contacts__inner-border" aria-hidden="true"></div>

		<div class="footer-contacts__content">
			<p class="footer-contacts__label animate-on-scroll">contacts</p>
			<h2 class="footer-contacts__title animate-on-scroll animate-on-scroll--delay-200">Контакти<br>та бронювання</h2>
			<p class="footer-contacts__desc animate-on-scroll animate-on-scroll--delay-400">Зв&rsquo;яжіться з нами для отримання додаткової інформації.</p>
		</div>

		<div class="footer-contacts__actions">
			<button type="button" class="btn btn--primary" data-booking-open>Створити мій день на узбережжі <svg class="btn__icon" xmlns="http://www.w3.org/2000/svg" width="13" height="10" viewBox="0 0 13 10" fill="none" aria-hidden="true"><path d="M7.78854 9.42292L6.91021 8.51917L10.0929 5.33646H0V4.08646H10.0929L6.91021 0.90375L7.78854 0L12.5 4.71146L7.78854 9.42292Z" /></svg></button>

			<a class="btn btn--white" href="{{whatsapp_url}}" target="_blank" rel="noopener noreferrer">Написати в WhatsApp <svg class="btn__icon" xmlns="http://www.w3.org/2000/svg" width="13" height="10" viewBox="0 0 13 10" fill="none" aria-hidden="true"><path d="M7.78854 9.42292L6.91021 8.51917L10.0929 5.33646H0V4.08646H10.0929L6.91021 0.90375L7.78854 0L12.5 4.71146L7.78854 9.42292Z" /></svg></a>
		</div>
	</div>
</section>
